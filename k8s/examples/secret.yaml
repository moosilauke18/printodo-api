# Template for the printodo app secret.
#
# Copy to ../secret.yaml, fill in real values, then `kubectl apply -f k8s/secret.yaml`.
# k8s/secret.yaml is gitignored so real values are never committed. This template
# lives in k8s/examples/ so `kubectl apply -f k8s/` never picks it up.
#
# Postgres credentials are NOT here — they come from the DigitalOcean operator
# objects (configMap evanfarrell-db-private-connection, secret
# evanfarrell-db-default-credentials), same as the upkeep/homebrewtech apps.
apiVersion: v1
kind: Secret
metadata:
  name: printodo-secret
type: Opaque
# stringData takes raw values; Kubernetes base64-encodes them for you.
stringData:
  password: "REPLACE_ME"            # app login password (username defaults to "test")
  jwt-signing-key: "REPLACE_ME"     # HMAC key for API + admin-cookie JWTs
  anthropic-api-key: "REPLACE_ME"   # optional; enables AI categories + brand links
